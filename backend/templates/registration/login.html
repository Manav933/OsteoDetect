{% extends 'base.html' %}

{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
    <div class="card" style="text-align: center;">
        <h2 style="margin-top: 0; margin-bottom: 0.4rem;">Welcome Back</h2>
        <p style="color: var(--text-muted); margin-top: 0; margin-bottom: 1.8rem;">Sign in to access your diagnostic workspace.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group" style="text-align: left;">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required>
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--highlight-color); text-decoration: none;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
